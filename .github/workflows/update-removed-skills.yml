name: Update Removed Skills

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-removed-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/openclaw/skills.git || true
          git fetch upstream main --prune

      - name: Update from upstream
        run: |
          git checkout main
          git merge --no-edit upstream/main

      - name: Generate removed skills README
        run: node scripts/generate-removed-readme.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- README.md; then
            echo "No removed skills changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update removed skills index"
          git push
