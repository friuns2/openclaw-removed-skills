<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 记忆系统 v2.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }

    h1 { text-align: center; font-size: 24px; padding: 20px 0; color: #a78bfa; }
    h1 span { font-size: 14px; color: #666; display: block; margin-top: 5px; }
    .status { text-align: center; font-size: 12px; color: #22c55e; margin-bottom: 20px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .card { background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a; }
    .card-title { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .card-value { font-size: 32px; font-weight: 700; }
    .card-value.flash { color: #f59e0b; }
    .card-value.active { color: #22c55e; }
    .card-value.attention { color: #3b82f6; }
    .card-value.settled { color: #a78bfa; }

    .bar-chart { margin-bottom: 20px; }
    .bar-chart h3 { font-size: 14px; margin-bottom: 10px; color: #aaa; }
    .bar-row { display: flex; align-items: center; margin-bottom: 8px; }
    .bar-label { width: 120px; font-size: 13px; color: #ccc; text-align: right; padding-right: 10px; }
    .bar-track { flex: 1; height: 24px; background: #1a1a2e; border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; }
    .bar-fill.flash { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .bar-fill.active { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .bar-fill.attention { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .bar-fill.settled { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }

    .tags { margin-bottom: 20px; }
    .tags h3 { font-size: 14px; margin-bottom: 10px; color: #aaa; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { background: #2a2a4a; padding: 4px 12px; border-radius: 16px; font-size: 13px; color: #c4b5fd; }
    .tag .count { color: #666; font-size: 11px; margin-left: 4px; }

    .timeline { margin-bottom: 20px; }
    .timeline h3 { font-size: 14px; margin-bottom: 10px; color: #aaa; }
    .timeline-item { display: flex; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #1a1a2e; }
    .timeline-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-right: 10px; flex-shrink: 0; }
    .timeline-icon.consolidate { background: #1e3a5f; }
    .timeline-icon.merge { background: #3b1f5e; }
    .timeline-icon.archive { background: #5e3b1f; }
    .timeline-text { font-size: 13px; color: #ccc; }

    .memories-list { margin-bottom: 20px; }
    .memories-list h3 { font-size: 14px; margin-bottom: 10px; color: #aaa; }
    .memory-item { background: #1a1a2e; border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 1px solid #2a2a4a; }
    .memory-item .title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .memory-item .summary { font-size: 12px; color: #888; margin-bottom: 4px; }
    .memory-item .meta { display: flex; gap: 12px; font-size: 11px; color: #555; }
    .layer-badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .layer-badge.flash { background: #f59e0b22; color: #f59e0b; }
    .layer-badge.active { background: #22c55e22; color: #22c55e; }
    .layer-badge.attention { background: #3b82f622; color: #3b82f6; }
    .layer-badge.settled { background: #a78bfa22; color: #a78bfa; }

    .ws-status { position: fixed; top: 10px; right: 10px; font-size: 11px; color: #666; }
    .ws-status.connected { color: #22c55e; }
    .ws-status.disconnected { color: #ef4444; }

    .search-box { margin-bottom: 20px; }
    .search-box input { width: 100%; padding: 12px 16px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none; }
    .search-box input:focus { border-color: #a78bfa; }
    .search-results { margin-top: 10px; }
    .search-result-item { background: #1a1a2e; border-radius: 8px; padding: 10px; margin-bottom: 6px; border: 1px solid #2a2a4a; cursor: pointer; }
    .search-result-item .score { color: #22c55e; font-size: 11px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 记忆系统 v2.0<span>layered-memory-sys</span></h1>
    <div class="status" id="status">● 连接中...</div>
    <div class="ws-status" id="ws-status">WebSocket: --</div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜索记忆..." onkeyup="handleSearch(event)">
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="grid" id="statsGrid"></div>

    <div class="bar-chart" id="layerChart"></div>
    <div class="tags" id="tagCloud"></div>
    <div class="memories-list" id="memoriesList"></div>
    <div class="timeline" id="timeline"></div>
  </div>

  <script>
    const API = window.location.port === '3456' ? '' : 'http://localhost:3456';
    let ws = null;

    async function refresh() {
      try {
        const [statsRes, memoriesRes, eventsRes] = await Promise.all([
          fetch(`${API}/api/stats`),
          fetch(`${API}/api/memories?limit=50`),
          fetch(`${API}/api/events?limit=20`),
        ]);
        const stats = await statsRes.json();
        const memories = await memoriesRes.json();
        const events = await eventsRes.json();
        renderStats(stats, memories);
        renderMemories(memories.memories || []);
        renderTimeline(stats.dreamLogs || []);
        document.getElementById('status').textContent = '● 已连接';
        document.getElementById('status').style.color = '#22c55e';
      } catch (e) {
        document.getElementById('status').textContent = '● 连接失败: ' + e.message;
        document.getElementById('status').style.color = '#ef4444';
      }
    }

    function renderStats(stats, memories) {
      const total = stats.layers.reduce((s, l) => s + l.count, 0);
      document.getElementById('statsGrid').innerHTML = `
        <div class="card"><div class="card-title">总记忆</div><div class="card-value">${total}</div></div>
        ${stats.layers.map(l => `
          <div class="card">
            <div class="card-title">${l.layer}</div>
            <div class="card-value ${l.layer}">${l.count}</div>
          </div>
        `).join('')}
      `;

      const maxCount = Math.max(...stats.layers.map(l => l.count), 1);
      document.getElementById('layerChart').innerHTML = `
        <h3>📊 层级分布</h3>
        ${stats.layers.map(l => `
          <div class="bar-row">
            <div class="bar-label">${l.layer}</div>
            <div class="bar-track">
              <div class="bar-fill ${l.layer}" style="width: ${(l.count/maxCount*100).toFixed(0)}%">${l.count}</div>
            </div>
          </div>
        `).join('')}
      `;

      document.getElementById('tagCloud').innerHTML = `
        <h3>🏷️ 热门标签</h3>
        <div class="tag-cloud">
          ${stats.tags.map(t => `<div class="tag">${t.tag}<span class="count">(${t.count})</span></div>`).join('')}
        </div>
      `;
    }

    function renderMemories(memories) {
      document.getElementById('memoriesList').innerHTML = `
        <h3>📝 活跃记忆 (${memories.length})</h3>
        ${memories.map(m => `
          <div class="memory-item">
            <div class="title">${m.title}</div>
            <div class="summary">${(m.summary || '').slice(0, 100)}</div>
            <div class="meta">
              <span class="layer-badge ${m.layer}">${m.layer}</span>
              <span>召回 ${m.recall_count || 0} 次</span>
              <span>更新 ${m.last_active || '-'}</span>
            </div>
          </div>
        `).join('')}
      `;
    }

    function renderTimeline(logs) {
      const icons = { consolidate: '🧠', merge: '🔗', archive: '📦', forget: '🗑️', autowrite: '✏️' };
      document.getElementById('timeline').innerHTML = `
        <h3>🌙 最近梦境</h3>
        ${logs.slice(0, 10).map(l => `
          <div class="timeline-item">
            <div class="timeline-icon ${l.action}">${icons[l.action] || '📋'}</div>
            <div class="timeline-text">${l.detail || l.action} <span style="color:#555">${l.date}</span></div>
          </div>
        `).join('')}
      `;
    }

    async function handleSearch(e) {
      if (e.key !== 'Enter') return;
      const q = document.getElementById('searchInput').value.trim();
      if (!q) { document.getElementById('searchResults').innerHTML = ''; return; }
      try {
        const res = await fetch(`${API}/api/search`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q, limit: 10 })
        });
        const data = await res.json();
        document.getElementById('searchResults').innerHTML = data.results.map(r => `
          <div class="search-result-item">
            <div>${r.title} <span class="score">${(r.score*100).toFixed(0)}% ${r.matchType}</span></div>
            <div style="font-size:12px;color:#888">${r.snippet || ''}</div>
          </div>
        `).join('') || '<div style="padding:10px;color:#555">无结果</div>';
      } catch (e) {
        document.getElementById('searchResults').innerHTML = `<div style="color:#ef4444">搜索失败: ${e.message}</div>`;
      }
    }

    // WebSocket 连接
    function connectWS() {
      try {
        const wsPort = 3457;
        ws = new WebSocket(`ws://localhost:${wsPort}`);
        ws.onopen = () => {
          document.getElementById('ws-status').textContent = 'WebSocket: ● 已连接';
          document.getElementById('ws-status').className = 'ws-status connected';
        };
        ws.onclose = () => {
          document.getElementById('ws-status').textContent = 'WebSocket: ○ 断开';
          document.getElementById('ws-status').className = 'ws-status disconnected';
          setTimeout(connectWS, 5000);
        };
        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'pong') return;
          refresh(); // 有事件就刷新
        };
      } catch {}
    }

    // 启动
    refresh();
    setInterval(refresh, 60000); // 每60秒刷新
    connectWS();
  </script>
</body>
</html>
