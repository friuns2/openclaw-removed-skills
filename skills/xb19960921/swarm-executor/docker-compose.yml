version: '3.8'

services:
  # Redis服务（消息队列）
  redis:
    image: redis:7.0-alpine
    container_name: swarm-coordinator-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - swarm-network

  # Swarm协调器API服务
  coordinator-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swarm-coordinator-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - USE_REDIS=${USE_REDIS:-true}
      - TOKEN_BUDGET_ENABLED=${TOKEN_BUDGET_ENABLED:-true}
      - AUTO_DOWNGRADE_ENABLED=${AUTO_DOWNGRADE_ENABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONPATH=/app
    volumes:
      - ./coordinator:/app/coordinator
      - ./schemas:/app/schemas
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - swarm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 监控服务（可选）
  monitor:
    image: grafana/grafana:latest
    container_name: swarm-coordinator-monitor
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/datasources:/etc/grafana/provisioning/datasources
    networks:
      - swarm-network

  # Prometheus（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: swarm-coordinator-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - swarm-network

  # Node Exporter（可选，用于主机监控）
  node-exporter:
    image: prom/node-exporter:latest
    container_name: swarm-coordinator-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - swarm-network

volumes:
  redis-data:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local

networks:
  swarm-network:
    driver: bridge
    name: swarm-coordinator-network