# Key names for aws.env at repo root (this file is valid YAML, for reference only; actual secrets go in aws.env, one KEY=value per line)
---
# Writing model (pairs with writing_model in config.yaml)
WRITING_MODEL_API_KEY: ""

# Image model (pairs with image_model in config.yaml)
IMAGE_MODEL_API_KEY: ""

# WeChat official account (slot count determined by wechat_accounts in config.yaml; set to 2 requires filling WECHAT_2_*)
WECHAT_1_APPID: ""
WECHAT_1_APPSECRET: ""
WECHAT_2_APPID: ""
WECHAT_2_APPSECRET: ""
