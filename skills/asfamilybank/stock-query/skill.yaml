name: stock-query
version: 2.6.0
author: asfamilybank
description: >
  查询全球主要市场股票实时行情：A 股、港股、美股，以及 ETF、场外基金、主要指数，支持批量查询、自选市值计算与个股历史K线（含 MA5/MA10/MA20/MA60 均线）。
  同时支持在用户显式指令下通过内联 bash 命令管理本地 portfolio.csv 自选股文件（增/删/改/查），文件仅含股票代码、名称、数量、自选价格，禁止存放账户凭证或密钥。
  需要：curl（行情 API 请求）、iconv（GBK→UTF-8 转码）。
  文件访问：仅限 portfolio.csv，优先查找 ~/.config/stock-query/portfolio.csv，其次兼容旧版安装目录，不访问其他系统文件。
  网络访问：仅限 qt.gtimg.cn、hq.sinajs.cn、push2.eastmoney.com、web.ifzq.gtimg.cn、query1.finance.yahoo.com、fundgz.1234567.com.cn、api.fund.eastmoney.com 七个行情数据源。
  Use when: 用户提到"查股价""查净值""行情""最新价""自选市值""实时价格""大盘""指数""港股""美股"等。
  NOT for: 加密货币、期货、期权、外汇。
emoji: "📈"
requires:
  bins: [curl, iconv, python3]
  os: [darwin, linux]
license: MIT
repository: https://github.com/asfamilybank/stock-query

permissions:
  - network  # 用途：curl 调用行情 API（仅限 qt.gtimg.cn / hq.sinajs.cn / push2.eastmoney.com / web.ifzq.gtimg.cn / query1.finance.yahoo.com / fundgz.1234567.com.cn / api.fund.eastmoney.com）
  - shell    # 用途：执行 curl、iconv 转码、grep/awk 文件操作（仅操作 portfolio.csv，不执行任意命令）

entryPoint:
  type: natural
  prompt: |
    你是一个全球股票行情查询助手。根据 SKILL.md 中的工作流程，
    识别用户提供的标的代码（包括 A 股、港股、美股、ETF、基金及指数），
    调用腾讯财经接口查询行情，A 股失败时回退新浪接口。
    所有腾讯和新浪接口的 curl 响应必须通过 iconv -f GBK -t UTF-8 转码。

triggers:
  keywords:
    - "查股价"
    - "查行情"
    - "查指数"
    - "大盘"
    - "上证指数"
    - "查净值"
    - "最新价"
    - "stock price"
    - "实时价格"
    - "自选市值"
    - "基金估值"
    - "港股"
    - "美股"
    - "纳斯达克"
    - "道琼斯"
    - "恒生指数"
