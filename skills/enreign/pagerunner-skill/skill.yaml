# Pagerunner Skill for Claude Code
# Real Chrome browser automation for AI agents

name: pagerunner-skill
slug: pagerunner
version: "1.3.1"
description: "Real Chrome automation for Claude — authenticated sessions, sealed secrets, site intelligence, and video recording"

long_description: |
  Pagerunner gives Claude, Cursor, Windsurf, and any MCP client native control over your real Chrome browser.

  Works with your existing login sessions, cookies, and browser history already loaded. Designed for 4 ICPs:
  - Solo Developer: Close the dev loop (edit code → see result in browser)
  - Power User: Autonomous phone-triggered tasks (WhatsApp → agent works → screenshot back)
  - Security-Conscious: Sensitive data automation with PII anonymization + audit trails
  - Server-Side: Persistent headless automation with multi-agent coordination via KV store

  Features: Real authenticated browser, PII tokenization, sealed-secret trust boundary (v0.7), session checkpoints + auto-reattach (v0.6), site adapters for direct API calls (v0.5), network + console capture, video recording with auto-zoom + cursor tracking (v0.8), encrypted state, audit logging, domain allowlisting, stealth mode.

category: "Browser Automation"
keywords:
  - browser-automation
  - MCP
  - Chrome
  - AI-agents
  - authentication
  - form-filling
  - web-scraping
  - PII-protection
  - sealed-secrets
  - site-intelligence
  - video-recording
  - session-checkpoints
  - multi-agent
  - agent-automation

icps:
  - name: "Solo Developer"
    description: "Edit code → see result in real browser → iterate without manual verification"
    use_case: "Frontend development with immediate visual feedback"
    example: |
      const sessionId = await open_session({ profile: "personal" });
      const [tab] = await list_tabs(sessionId);
      await navigate(sessionId, tab.target_id, "http://localhost:3000");
      await screenshot(sessionId, tab.target_id);
      await close_session(sessionId);
    documentation_path: "SKILL.md#-solo-developer"

  - name: "Power User"
    description: "Get browser tasks done from your phone while laptop runs unattended"
    use_case: "Autonomous mobile-triggered tasks, agent profile isolation, persistent sessions"
    example: |
      pagerunner open-session agent-work
      pagerunner restore-snapshot <session> <tab> https://jira.mycompany.com
      # Agent is logged in. Now do work: navigate, get_content, fill forms
    documentation_path: "SKILL.md#-power-user"

  - name: "Security-Conscious"
    description: "Automate sensitive workflows without PII reaching the LLM"
    use_case: "Regulated industries, confidential data, compliance-required anonymization"
    example: |
      open_session({
        profile: "agent",
        anonymize: true  // PII stripped before reaching Claude
      });
      const content = await get_content(sessionId, tabId);
      // john@company.com → [EMAIL:a3f9b2]
    documentation_path: "SKILL.md#-security-conscious"

  - name: "Server-Side / Infrastructure"
    description: "Persistent headless automation with multi-agent coordination"
    use_case: "Scheduled cron jobs, daemon-based automation, agents sharing state"
    example: |
      pagerunner daemon &  # Run once, holds DB lock

      // Agent A: collect data
      await kv_set("pipeline", "pricing_data", JSON.stringify(results));

      // Agent B: continue where A left off
      const data = JSON.parse(await kv_get("pipeline", "pricing_data"));
    documentation_path: "SKILL.md#-server-side--infrastructure"

