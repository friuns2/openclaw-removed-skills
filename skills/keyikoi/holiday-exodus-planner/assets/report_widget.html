<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .report-container { font-family: var(--font-family); color: var(--color-text); padding: 20px; max-width: 680px; margin: 0 auto; }
  .report-header { text-align: center; padding: 24px 0 20px; border-bottom: 2px solid var(--color-border); margin-bottom: 20px; }
  .report-badge { display: inline-block; padding: 4px 12px; background: var(--color-accent); color: var(--color-accent-text); border-radius: 4px; font-size: 11px; font-weight: 500; letter-spacing: 1px; margin-bottom: 8px; }
  .report-title { font-size: 20px; font-weight: 500; margin: 8px 0 4px; }
  .report-holiday { font-size: 13px; color: var(--color-text-muted); }
  .verdict-box { background: var(--color-surface); border-left: 3px solid var(--color-accent); padding: 16px 20px; margin: 16px 0; border-radius: 0 8px 8px 0; }
  .verdict-box p { font-size: 15px; font-weight: 500; line-height: 1.6; }
  .section { margin: 24px 0; }
  .section-title { font-size: 16px; font-weight: 500; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: 8px; }
  .section-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .eval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .eval-card { background: var(--color-surface); border-radius: 8px; padding: 12px 14px; border: 1px solid var(--color-border); }
  .eval-label { font-size: 12px; color: var(--color-text-muted); margin-bottom: 4px; }
  .eval-value { font-size: 14px; font-weight: 500; }
  .eval-desc { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; line-height: 1.5; }
  .level-high { color: var(--color-danger); }
  .level-mid { color: var(--color-warning); }
  .level-low { color: var(--color-success); }
  .window-card { background: var(--color-surface); border-radius: 8px; padding: 16px; border: 1px solid var(--color-border); margin-bottom: 10px; }
  .window-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .window-tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .tag-primary { background: var(--color-accent); color: var(--color-accent-text); }
  .tag-secondary { background: var(--color-surface-elevated); color: var(--color-text-muted); border: 1px solid var(--color-border); }
  .window-detail { font-size: 13px; line-height: 1.8; color: var(--color-text); }
  .window-detail span { color: var(--color-text-muted); margin-right: 6px; }
  .dest-card { background: var(--color-surface); border-radius: 8px; padding: 16px; border: 1px solid var(--color-border); margin-bottom: 10px; }
  .dest-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .dest-name { font-size: 15px; font-weight: 500; }
  .dest-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .dest-tag { padding: 2px 8px; background: var(--color-surface-elevated); border-radius: 4px; font-size: 11px; color: var(--color-text-muted); }
  .dest-desc { font-size: 13px; color: var(--color-text); line-height: 1.7; }
  .dest-desc li { margin-bottom: 4px; list-style: none; padding-left: 16px; position: relative; }
  .dest-desc li::before { content: ''; position: absolute; left: 0; top: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--color-border); }
  .dest-primary li::before { background: var(--color-accent); }
  .budget-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .budget-table th { text-align: left; padding: 8px 12px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); color: var(--color-text-muted); font-weight: 500; font-size: 12px; }
  .budget-table td { padding: 8px 12px; border-bottom: 1px solid var(--color-border); }
  .budget-table tr:last-child td { font-weight: 500; background: var(--color-surface); }
  .budget-table .budget-range { color: var(--color-accent-light); font-weight: 500; }
  .warn-list { list-style: none; }
  .warn-list li { padding: 10px 14px; background: var(--color-surface); border-radius: 8px; margin-bottom: 6px; font-size: 13px; line-height: 1.6; border: 1px solid var(--color-border); border-left: 3px solid var(--color-danger); }
  .final-verdict { background: var(--color-surface); border: 2px solid var(--color-accent); border-radius: 8px; padding: 20px; text-align: center; margin: 20px 0; }
  .final-verdict p { font-size: 16px; font-weight: 500; line-height: 1.6; }
  .action-list { list-style: none; counter-reset: action; }
  .action-list li { padding: 12px 14px 12px 44px; background: var(--color-surface); border-radius: 8px; margin-bottom: 6px; font-size: 13px; line-height: 1.6; border: 1px solid var(--color-border); position: relative; }
  .action-list li::before { counter-increment: action; content: counter(action); position: absolute; left: 14px; top: 12px; width: 22px; height: 22px; border-radius: 50%; background: var(--color-accent); color: var(--color-accent-text); font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; }
  .action-label { font-size: 11px; color: var(--color-text-muted); display: block; margin-bottom: 2px; }
  .radar-container { display: flex; justify-content: center; margin: 12px 0; }
  .radar-container canvas { max-width: 320px; max-height: 280px; }
</style>

<div class="report-container">
  <div class="report-header">
    <div class="report-badge">出行判官</div>
    <div class="report-title" id="reportTitle">节假日错峰出行判官报告</div>
    <div class="report-holiday" id="reportHoliday"></div>
  </div>

  <div class="verdict-box" id="verdictBox">
    <p id="verdictText"></p>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon">&#x2261;</span> 多维评估</div>
    <div class="radar-container"><canvas id="radarChart"></canvas></div>
    <div class="eval-grid" id="evalGrid"></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon">&#x25C7;</span> 最佳出行窗口</div>
    <div id="windowCards"></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon">&#x25CB;</span> 推荐目的地</div>
    <div id="destCards"></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon">&#x00A5;</span> 预算建议</div>
    <div id="budgetNote" style="font-size:13px;color:var(--color-text-muted);margin-bottom:10px;"></div>
    <table class="budget-table" id="budgetTable">
      <thead><tr><th>项目</th><th>预算范围</th><th>说明</th></tr></thead>
      <tbody id="budgetBody"></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon">&#x2717;</span> 不建议方案</div>
    <ul class="warn-list" id="warnList"></ul>
  </div>

  <div class="final-verdict" id="finalVerdict">
    <p id="finalVerdictText"></p>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon">&#x279C;</span> 下一步动作</div>
    <ol class="action-list" id="actionList"></ol>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  const data = window.__WIDGET_DATA__ || {};

  document.getElementById('reportHoliday').textContent = data.holiday_label || '';
  document.getElementById('verdictText').textContent = data.verdict || '';
  document.getElementById('finalVerdictText').textContent = data.final_verdict || '';

  if (data.budget_note) {
    document.getElementById('budgetNote').textContent = data.budget_note;
  }

  const evalMap = {
    high: { cls: 'level-high', label: '' },
    mid: { cls: 'level-mid', label: '' },
    low: { cls: 'level-low', label: '' }
  };

  if (data.evaluation && data.evaluation.length) {
    const grid = document.getElementById('evalGrid');
    data.evaluation.forEach(e => {
      const lv = evalMap[e.level] || evalMap.mid;
      const card = document.createElement('div');
      card.className = 'eval-card';
      card.innerHTML =
        '<div class="eval-label">' + e.dimension + '</div>' +
        '<div class="eval-value ' + lv.cls + '">' + e.value + '</div>' +
        '<div class="eval-desc">' + e.desc + '</div>';
      grid.appendChild(card);
    });
  }

  const cs = getComputedStyle(document.documentElement);
  const muted = cs.getPropertyValue('--color-text-muted').trim();
  const border = cs.getPropertyValue('--color-border').trim();
  const accent = cs.getPropertyValue('--color-accent').trim();

  if (data.evaluation && data.evaluation.length) {
    const labels = data.evaluation.map(e => e.dimension);
    const values = data.evaluation.map(e => {
      if (e.score !== undefined) return e.score;
      if (e.level === 'low') return 2;
      if (e.level === 'mid') return 5;
      return 8;
    });
    const ctx = document.getElementById('radarChart').getContext('2d');
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: labels,
        datasets: [{
          data: values,
          backgroundColor: 'rgba(124,58,237,0.15)',
          borderColor: accent || '#7c3aed',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: accent || '#7c3aed'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          r: {
            beginAtZero: true,
            max: 10,
            ticks: { display: false },
            grid: { color: border },
            angleLines: { color: border },
            pointLabels: { color: muted, font: { size: 12 } }
          }
        },
        plugins: { legend: { display: false } }
      }
    });
  }

  if (data.travel_windows && data.travel_windows.length) {
    const container = document.getElementById('windowCards');
    data.travel_windows.forEach(w => {
      const card = document.createElement('div');
      card.className = 'window-card';
      const tagCls = w.primary ? 'tag-primary' : 'tag-secondary';
      card.innerHTML =
        '<div class="window-card-header">' +
        '<span style="font-weight:500;font-size:14px">' + w.label + '</span>' +
        '<span class="window-tag ' + tagCls + '">' + (w.tag || '') + '</span>' +
        '</div>' +
        '<div class="window-detail">' +
        (w.leave ? '<div><span>请假：</span>' + w.leave + '</div>' : '') +
        '<div><span>出发：</span>' + w.depart + '</div>' +
        '<div><span>返程：</span>' + w.return_date + '</div>' +
        '<div><span>行程：</span>' + w.duration + '</div>' +
        '<div><span>优势：</span>' + w.advantage + '</div>' +
        '</div>';
      container.appendChild(card);
    });
  }

  if (data.destinations && data.destinations.length) {
    const container = document.getElementById('destCards');
    data.destinations.forEach(d => {
      const card = document.createElement('div');
      card.className = 'dest-card';
      const tags = (d.tags || []).map(t => '<span class="dest-tag">' + t + '</span>').join('');
      const tagCls = d.primary ? 'tag-primary' : 'tag-secondary';
      const descCls = d.primary ? 'dest-desc dest-primary' : 'dest-desc';
      const reasons = (d.reasons || []).map(r => '<li>' + r + '</li>').join('');
      card.innerHTML =
        '<div class="dest-header">' +
        '<span class="dest-name">' + d.name + '</span>' +
        '<span class="window-tag ' + tagCls + '">' + (d.label || '') + '</span>' +
        '</div>' +
        '<div class="dest-tags">' + tags + '</div>' +
        '<ul class="' + descCls + '" style="margin-top:8px">' + reasons + '</ul>';
      container.appendChild(card);
    });
  }

  if (data.budget && data.budget.length) {
    const body = document.getElementById('budgetBody');
    data.budget.forEach(b => {
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + b.item + '</td>' +
        '<td class="budget-range">' + b.range + '</td>' +
        '<td>' + b.note + '</td>';
      body.appendChild(tr);
    });
  }

  if (data.warnings && data.warnings.length) {
    const list = document.getElementById('warnList');
    data.warnings.forEach(w => {
      const li = document.createElement('li');
      li.textContent = w;
      list.appendChild(li);
    });
  }

  if (data.actions && data.actions.length) {
    const list = document.getElementById('actionList');
    data.actions.forEach(a => {
      const li = document.createElement('li');
      li.innerHTML = '<span class="action-label">' + a.timing + '</span>' + a.action;
      list.appendChild(li);
    });
  }
</script>
