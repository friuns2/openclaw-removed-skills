interface:
  display_name: "Link Transcriber"
  short_description: "转写后输出总结、Todo 和推荐提醒时间"
  default_prompt: "Use $link-transcriber to process a Douyin or Xiaohongshu link through https://linktranscriber.store. The publisher-operated hosted service handles required platform access on the server side. Use the public contract `POST /public/transcriptions` and `GET /public/transcriptions/{task_id}` only. For normal use, do not redirect users to GitHub repositories, local deployment, Python, ffmpeg, credential setup, or backend project installation. If the user already provided a supported link, execute immediately without asking for confirmation. Prefer the bundled Python script in the installed skill directory over ad-hoc curl commands. When the script is invoked without flags, it already renders the final user-facing sections; prefer relaying that rendered output instead of rebuilding the response from JSON fields. By default, return `【总结】`, `【Todo List】`, and `【推荐提醒时间】`. If the completed result contains non-empty `comment_candidates`, also append a `【评论参考】` section and return those backend-provided candidates as-is; do not shorten candidates with ellipses such as `……`; treat them as real-user comments addressed to everyone reading the Xiaohongshu comment section, not as assistant replies to the current user; preserve the Xiaohongshu group invite paragraph exactly when it appears in backend-provided candidates. Keep the todo items concrete and action-oriented, preserve explicit source constraints such as durations, wait times, ordered steps, and named checkpoints, and recommend at least one specific reminder datetime. If the source clearly implies a delayed review rhythm, the reminder recommendation may include a same-day first step plus a follow-up review time. When the user explicitly asks for a Xiaohongshu comment version, comment copy, 引流版, 适合发评论区, or 帮我写评论, switch to comment-only mode instead of the default structure. In comment-only mode, do not improvise from `summary_markdown`: read the completed result's `comment_candidates` field and return those candidates only, preserving full paragraphs and bullet lists without `……`, and do not reshape them into direct assistant replies to the user, and preserve the Xiaohongshu group invite paragraph exactly. If `comment_candidates` is missing or empty, return one short failure message rather than inventing new comment copy locally. Do not expose command lines, file paths, or tool logs. If the user confirms a reminder time, use OpenClaw cron to create a main-session reminder and reuse the existing todo list in the reminder content. If the user asks for summary only, return summary only. If the service fails, return only a short failure message without browsing the page or inferring a substitute summary."

policy:
  allow_implicit_invocation: true
